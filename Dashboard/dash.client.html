/* ت(Bell Wobble Animation) */
.animated-bell:hover .bell-icon {
    animation: bell-wobble 0.6s ease-in-out infinite; /* سرعة ونوع الحركة */
}

.bell-dot {
    position: absolute;
    bottom: -3px;
    right: 50%; 
    transform: translateX(50%);
    font-size: 6px; /* حجم النقطة */
    color: var(--c4); 
}

/* الاهتزاز */
@keyframes bell-wobble {
    0% { transform: rotate(0deg); }
    15% { transform: rotate(10deg); }
    30% { transform: rotate(-10deg); }
    45% { transform: rotate(5deg); }
    60% { transform: rotate(-5deg); }
    75% { transform: rotate(2deg); }
    100% { transform: rotate(0deg); }
}

                <textarea id="jobDesc" rows="4" required placeholder="Describe the job requirements..."></textarea>
            </div>
            <div class="form-group">
                <label>Budget ($) *</label>
                <input type="number" id="jobBudget" required placeholder="500">
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select id="jobCategory">
                    <option>Web Development</option>
                    <option>Mobile Development</option>
                    <option>Design</option>
                    <option>Writing</option>
                    <option>Marketing</option>
                    <option>Data Science</option>
                </select>
            </div>
            <div class="form-group">
                <label>Duration</label>
                <select id="jobDuration">
                    <option>Less than 1 week</option>
                    <option>1-2 weeks</option>
                    <option>1 month</option>
                    <option>1-3 months</option>
                    <option>3+ months</option>
                </select>
            </div>
            <div style="display: flex; gap: 12px;">
                <button type="submit" class="btn-primary">Post Job</button>
                <button type="button" onclick="closeModal('postJobModal')" class="btn-outline">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Hire Modal -->
<div id="hireModal" class="modal">
    <div class="modal-content">
        <h2>💼 Hire Freelancer</h2>
        <form id="hireForm">
            <div class="form-group">
                <label>Freelancer</label>
                <input type="text" id="hireFreelancerName" readonly>
            </div>
            <div class="form-group">
                <label>Select Job</label>
                <select id="hireJobSelect" required>
                    <option value="">Choose a job...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Offer Amount ($)</label>
                <input type="number" id="hireAmount" required placeholder="Enter amount">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="hireMessage" rows="3" placeholder="Explain project details..."></textarea>
            </div>
            <div style="display: flex; gap: 12px;">
                <button type="submit" class="btn-primary">Send Offer</button>
                <button type="button" onclick="closeModal('hireModal')" class="btn-outline">Cancel</button>
            </div>
        </form>
    </div>
</div>

<div id="notificationsDropdown" class="notifications-dropdown"></div>

<script>
    // ==================== DATA STATE ====================
    let currentPage = 'dashboard';
    let selectedFreelancer = null;

    let myJobs = [
        { id: 1, title: 'E-commerce Website Development', description: 'Full e-commerce site with payment', budget: 3500, status: 'Open', category: 'Web Development', posted: '2024-03-10', proposals: 5 },
        { id: 2, title: 'Mobile App UI/UX Design', description: 'Fitness app design', budget: 1200, status: 'In Progress', category: 'Design', posted: '2024-03-05', proposals: 8 },
        { id: 3, title: 'Content Writing for Blog', description: '10 SEO articles', budget: 800, status: 'Open', category: 'Writing', posted: '2024-03-12', proposals: 12 }
    ];

    let hiredFreelancers = [
        { id: 1, name: 'Alex Johnson', skill: 'React Developer', job: 'E-commerce Website Development', budget: 3500, startDate: '2024-03-15', status: 'In Progress', rating: 4.8, avatar: 'AJ' },
        { id: 2, name: 'Maria Garcia', skill: 'UI Designer', job: 'Mobile App UI/UX Design', budget: 1200, startDate: '2024-03-10', status: 'In Progress', rating: 4.9, avatar: 'MG' }
    ];

    let freelancers = [
        { id: 1, name: 'John Doe', title: 'Full Stack Developer', skills: ['React', 'Node.js', 'Python'], rating: 4.9, hourlyRate: 45, completedJobs: 127, avatar: 'JD' },
        { id: 2, name: 'Sarah Smith', title: 'UI/UX Designer', skills: ['Figma', 'Adobe XD'], rating: 4.8, hourlyRate: 35, completedJobs: 89, avatar: 'SS' },
        { id: 3, name: 'Mike Chen', title: 'WordPress Expert', skills: ['WordPress', 'PHP'], rating: 4.7, hourlyRate: 30, completedJobs: 156, avatar: 'MC' },
        { id: 4, name: 'Emily Brown', title: 'Content Writer', skills: ['SEO', 'Blog Posts'], rating: 4.9, hourlyRate: 25, completedJobs: 234, avatar: 'EB' }
    ];

    let payments = [
        { id: 1, freelancer: 'Alex Johnson', job: 'E-commerce Website', amount: 1500, date: '2024-03-20', status: 'Paid' },
        { id: 2, freelancer: 'Maria Garcia', job: 'Mobile App Design', amount: 600, date: '2024-03-18', status: 'Paid' },
        { id: 3, freelancer: 'John Doe', job: 'API Integration', amount: 800, date: '2024-03-25', status: 'Pending' }
    ];

    let notifications = [
        { id: 1, message: 'New proposal received for "E-commerce Website"', time: '5 min ago', read: false },
        { id: 2, message: 'Alex Johnson completed milestone 1', time: '1 hour ago', read: false },
        { id: 3, message: 'Payment of $1500 was successful', time: '2 hours ago', read: false }
    ];

    let chartInstances = {};

    // ==================== HELPER FUNCTIONS ====================
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}" style="color: ${type === 'success' ? '#28a745' : '#dc3545'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    function openModal(modalId) {
        document.getElementById(modalId).style.display = 'flex';
    }

    // ==================== BUSINESS LOGIC ====================
    function postJob(jobData) {
        const newJob = {
            id: Date.now(),
            title: jobData.title,
            description: jobData.description,
            budget: parseInt(jobData.budget),
            status: 'Open',
            category: jobData.category,
            posted: new Date().toISOString().split('T')[0],
            proposals: 0
        };
        myJobs.unshift(newJob);
        showToast('✅ Job posted successfully!');
        renderCurrentPage();
    }

    function deleteJob(id) {
        const job = myJobs.find(j => j.id === id);
        if (job && job.status === 'Open') {
            if (confirm('Delete this job?')) {
                myJobs = myJobs.filter(j => j.id !== id);
                showToast('Job deleted');
                renderCurrentPage();
            }
        } else {
            showToast('Cannot delete an active job', 'error');
        }
    }

    function viewProposals(jobId) {
        const job = myJobs.find(j => j.id === jobId);
        showToast(`📋 ${job.proposals} proposals received for "${job.title}"`);
    }

    function openHireModal(freelancer) {
        selectedFreelancer = freelancer;
        document.getElementById('hireFreelancerName').value = freelancer.name;
        const jobSelect = document.getElementById('hireJobSelect');
        jobSelect.innerHTML = '<option value="">Select a job</option>';
        myJobs.filter(j => j.status === 'Open').forEach(job => {
            jobSelect.innerHTML += `<option value="${job.id}">${job.title} ($${job.budget})</option>`;
        });
        openModal('hireModal');
    }

    function hireFreelancer(jobId, amount, message) {
        const job = myJobs.find(j => j.id == jobId);
        if (!job) return false;
        
        const newHire = {
            id: Date.now(),
            name: selectedFreelancer.name,
            skill: selectedFreelancer.title,
            job: job.title,
            budget: parseInt(amount),
            startDate: new Date().toISOString().split('T')[0],
            status: 'In Progress',
            rating: selectedFreelancer.rating,
            avatar: selectedFreelancer.avatar
        };
        hiredFreelancers.push(newHire);
        job.status = 'In Progress';
        
        notifications.unshift({
            id: Date.now(),
            message: `🎉 You hired ${selectedFreelancer.name} for "${job.title}"`,
            time: 'Just now',
            read: false
        });
        
        showToast(`✨ Offer sent to ${selectedFreelancer.name}!`);
        return true;
    }

    function completeJob(hireId) {
        if (confirm('Mark as completed?')) {
            const hire = hiredFreelancers.find(h => h.id === hireId);
            if (hire) {
                hire.status = 'Completed';
                payments.unshift({
                    id: Date.now(),
                    freelancer: hire.name,
                    job: hire.job,
                    amount: hire.budget,
                    date: new Date().toISOString().split('T')[0],
                    status: 'Pending'
                });
                showToast(`🏆 Job completed! Payment of $${hire.budget} will be processed`);
                renderCurrentPage();
            }
        }
    }

    // ==================== CHARTS ====================
    function initCharts() {
        const ctx1 = document.getElementById('jobsChart')?.getContext('2d');
        const ctx2 = document.getElementById('spendingChart')?.getContext('2d');
        
        if (ctx1 && chartInstances.jobs) chartInstances.jobs.destroy();
        if (ctx2 && chartInstances.spending) chartInstances.spending.destroy();
        
        const openJobs = myJobs.filter(j => j.status === 'Open').length;
        const inProgress = hiredFreelancers.filter(h => h.status === 'In Progress').length;
        const completed = hiredFreelancers.filter(h => h.status === 'Completed').length;
        
        if (ctx1) {
            chartInstances.jobs = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['Open Jobs', 'In Progress', 'Completed'],
                    datasets: [{
                        data: [openJobs, inProgress, completed],
                        backgroundColor: ['#0077B8', '#ffc107', '#28a745'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
            });
        }
        
        const monthlySpending = [1250, 2100, 1850, 3200, 2800, 4100];
        if (ctx2) {
            chartInstances.spending = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Spending ($)',
                        data: monthlySpending,
                        borderColor: '#0077B8',
                        backgroundColor: 'rgba(0, 119, 184, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }
    }

    // ==================== RENDER FUNCTIONS ====================
    function renderDashboard() {
        const openJobs = myJobs.filter(j => j.status === 'Open').length;
        const activeProjects = hiredFreelancers.filter(h => h.status === 'In Progress').length;
        const totalSpent = payments.filter(p => p.status === 'Paid').reduce((sum, p) => sum + p.amount, 0);
        const totalProposals = myJobs.reduce((sum, j) => sum + j.proposals, 0);
        
        return `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-briefcase"></i></div><div class="stat-value">${myJobs.length}</div><div class="stat-label">Total Jobs</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-file-signature"></i></div><div class="stat-value">${openJobs}</div><div class="stat-label">Open Positions</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-user-check"></i></div><div class="stat-value">${activeProjects}</div><div class="stat-label">Active Projects</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-dollar-sign"></i></div><div class="stat-value">$${totalSpent.toLocaleString()}</div><div class="stat-label">Total Spent</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value">${totalProposals}</div><div class="stat-label">Proposals Received</div></div>
            </div>
            <div class="charts-row">
                <div class="chart-card"><h3><i class="fas fa-chart-pie"></i> Jobs Status</h3><canvas id="jobsChart"></canvas></div>
                <div class="chart-card"><h3><i class="fas fa-chart-line"></i> Monthly Spending</h3><canvas id="spendingChart"></canvas></div>
            </div>
            <div class="table-container">
                <div class="table-header"><h3><i class="fas fa-clock"></i> Recent Activity</h3></div>
                <div id="recentActivity"></div>
            </div>
        `;
    }

    function renderMyJobs() {
        return `
            <div class="table-container">
                <div class="table-header">
                    <h3><i class="fas fa-briefcase"></i> My Jobs</h3>
                    <button class="btn-primary" onclick="openModal('postJobModal')"><i class="fas fa-plus"></i> Post Job</button>
                </div>
                <table><thead><tr><th>Title</th><th>Category</th><th>Budget</th><th>Proposals</th><th>Status</th><th>Posted</th><th>Actions</th></tr></thead>
                <tbody id="myJobsTableBody"></tbody></table>
            </div>
        `;
    }

    function renderFreelancers() {
        return `
            <div class="table-container">
                <div class="table-header"><h3><i class="fas fa-users"></i> Find Freelancers</h3></div>
                <div class="freelancers-grid" id="freelancersGrid"></div>
            </div>
        `;
    }

    function renderHired() {
        return `
            <div class="table-container">
                <div class="table-header"><h3><i class="fas fa-user-check"></i> Hired Freelancers</h3></div>
                <table><thead><tr><th>Freelancer</th><th>Skill</th><th>Project</th><th>Budget</th><th>Start Date</th><th>Status</th><th>Rating</th><th>Actions</th></tr></thead>
                <tbody id="hiredTableBody"></tbody></table>
            </div>
        `;
    }

    function renderPayments() {
        const totalPaid = payments.filter(p => p.status === 'Paid').reduce((sum, p) => sum + p.amount, 0);
        const pending = payments.filter(p => p.status === 'Pending').reduce((sum, p) => sum + p.amount, 0);
        return `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-value">$${totalPaid.toLocaleString()}</div><div class="stat-label">Total Paid</div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value">$${pending.toLocaleString()}</div><div class="stat-label">Pending</div></div>
            </div>
            <div class="table-container">
                <div class="table-header"><h3><i class="fas fa-credit-card"></i> Payment History</h3></div>
                <table><thead><tr><th>Freelancer</th><th>Project</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
                <tbody id="paymentsTableBody"></tbody></table>
            </div>
        `;
    }

    function renderSettings() {
        return `
            <div class="table-container">
                <h3><i class="fas fa-building"></i> Company Settings</h3>
                <form id="settingsForm" style="margin-top: 20px;">
                    <div class="form-group"><label>Company Name</label><input type="text" id="companyName" value="Alex Parker Creative"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="companyEmail" value="alex@taskhunt.com"></div>
                    <div class="form-group"><label>Phone</label><input type="text" id="companyPhone" value="+1 (555) 123-4567"></div>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </form>
                <hr style="margin: 30px 0;">
                <h3><i class="fas fa-bell"></i> Notifications</h3>
                <div class="form-group"><label><input type="checkbox" checked> New proposals</label></div>
                <div class="form-group"><label><input type="checkbox" checked> Milestone updates</label></div>
                <div class="form-group"><label><input type="checkbox" checked> Payment confirmations</label></div>
            </div>
        `;
    }

    function renderProfile() {
        const totalSpent = payments.filter(p => p.status === 'Paid').reduce((sum, p) => sum + p.amount, 0);
        return `
            <div style="background: white; border-radius: 28px; padding: 32px; border: 1px solid var(--border-color);">
                <div style="display: flex; align-items: center; gap: 28px; flex-wrap: wrap;">
                    <img src="https://randomuser.me/api/portraits/men/32.jpg" style="width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--primary-blue);">
                    <div>
                        <h2 style="font-size: 28px;">Alex Parker <span style="background: var(--primary-light); padding: 4px 12px; border-radius: 30px; font-size: 12px;">Verified Client</span></h2>
                        <p style="color: var(--text-gray); margin-top: 8px;"><i class="fas fa-envelope"></i> alex.parker@taskhunt.com • <i class="fas fa-map-marker-alt"></i> San Francisco, CA</p>
                        <p>⭐ 4.9 Rating • ${myJobs.length} Jobs Posted • $${totalSpent.toLocaleString()} Spent</p>
                    </div>
                </div>
                <hr style="margin: 24px 0;">
                <h3>About Me</h3>
                <p style="margin-top: 12px; color: var(--text-gray);">Product manager & entrepreneur. I love building awesome digital products with top talent.</p>
                <div style="margin-top: 24px;"><h3>Skills I Hire For</h3><div style="display: flex; gap: 12px; margin-top: 12px;"><span class="skill-tag">React</span><span class="skill-tag">UI/UX</span><span class="skill-tag">Python</span><span class="skill-tag">WordPress</span></div></div>
            </div>
        `;
    }

    // ==================== TABLE POPULATORS ====================
    function populateMyJobsTable() {
        const tbody = document.getElementById('myJobsTableBody');
        if (tbody) {
            tbody.innerHTML = myJobs.map(job => `
                <tr>
                    <td><strong>${job.title}</strong></td>
                    <td>${job.category}</td>
                    <td>$${job.budget}</td>
                    <td>${job.proposals}</td>
                    <td><span class="status-badge status-${job.status === 'Open' ? 'open' : 'in-progress'}">${job.status}</span></td>
                    <td>${job.posted}</td>
                    <td class="action-buttons">
                        ${job.status === 'Open' ? `<button class="btn-icon" onclick="viewProposals(${job.id})"><i class="fas fa-users"></i></button>
                        <button class="btn-icon" onclick="deleteJob(${job.id})"><i class="fas fa-trash"></i></button>` : '<span style="color:gray;">Active</span>'}
                    </td>
                </tr>
            `).join('');
        }
    }

    function populateFreelancersGrid() {
        const grid = document.getElementById('freelancersGrid');
        if (grid) {
            grid.innerHTML = freelancers.map(f => `
                <div class="freelancer-card">
                    <div class="freelancer-header"><div class="freelancer-avatar">${f.avatar}</div><div><div class="freelancer-name">${f.name}</div><div class="freelancer-title">${f.title}</div></div></div>
                    <div class="freelancer-skills">${f.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
                    <div class="freelancer-rating">${'★'.repeat(Math.floor(f.rating))} (${f.rating}) • ${f.completedJobs} jobs</div>
                    <div><strong>$${f.hourlyRate}/hr</strong></div>
                    <button class="btn-primary" style="margin-top: 12px;" onclick='openHireModal(${JSON.stringify(f).replace(/'/g, "&#39;")})'>Hire Now</button>
                </div>
            `).join('');
        }
    }

    function populateHiredTable() {
        const tbody = document.getElementById('hiredTableBody');
        if (tbody) {
            tbody.innerHTML = hiredFreelancers.map(hire => `
                <tr>
                    <td><strong>${hire.name}</strong></td>
                    <td>${hire.skill}</td>
                    <td>${hire.job}</td>
                    <td>$${hire.budget}</td>
                    <td>${hire.startDate}</td>
                    <td><span class="status-badge status-${hire.status === 'In Progress' ? 'in-progress' : 'completed'}">${hire.status}</span></td>
                    <td>${'★'.repeat(Math.floor(hire.rating))}</td>
                    <td>${hire.status === 'In Progress' ? `<button class="btn-icon" onclick="completeJob(${hire.id})"><i class="fas fa-check-circle" style="color:#28a745;"></i></button>` : ''}</td>
                </tr>
            `).join('');
        }
    }

    function populatePaymentsTable() {
        const tbody = document.getElementById('paymentsTableBody');
        if (tbody) {
            tbody.innerHTML = payments.map(p => `
                <tr><td><strong>${p.freelancer}</strong></td><td>${p.job}</td><td>$${p.amount}</td><td>${p.date}</td><td><span class="status-badge status-${p.status === 'Paid' ? 'open' : 'pending'}">${p.status}</span></td></tr>
            `).join('');
        }
    }

    function renderRecentActivity() {
        const container = document.getElementById('recentActivity');
        if (container) {
            container.innerHTML = notifications.slice(0, 5).map(act => `
                <div style="padding: 12px 0; border-bottom: 1px solid var(--border-color);">
                    <i class="fas fa-circle" style="font-size: 8px; color: var(--primary-blue); margin-right: 12px;"></i>
                    ${act.message}<div style="font-size: 11px; color: var(--text-gray); margin-top: 4px;">${act.time}</div>
                </div>
            `).join('');
        }
    }

    // ==================== MAIN RENDER ====================
    function renderCurrentPage() {
        const contentDiv = document.getElementById('pageContent');
        switch(currentPage) {
            case 'dashboard':
                contentDiv.innerHTML = renderDashboard();
                renderRecentActivity();
                setTimeout(initCharts, 50);
                break;
            case 'my-jobs':
                contentDiv.innerHTML = renderMyJobs();
                populateMyJobsTable();
                break;
            case 'freelancers':
                contentDiv.innerHTML = renderFreelancers();
                populateFreelancersGrid();
                break;
            case 'hired':
                contentDiv.innerHTML = renderHired();
                populateHiredTable();
                break;
            case 'payments':
                contentDiv.innerHTML = renderPayments();
                populatePaymentsTable();
                break;
            case 'settings':
                contentDiv.innerHTML = renderSettings();
                document.getElementById('settingsForm')?.addEventListener('submit', (e) => { e.preventDefault(); showToast('Settings saved!'); });
                break;
            case 'profile':
                contentDiv.innerHTML = renderProfile();
                break;
        }
        document.querySelectorAll('.sidebar nav ul li').forEach(li => li.classList.remove('active'));
        const activeLink = document.querySelector(`.sidebar nav ul li[data-page="${currentPage}"]`);
        if (activeLink) activeLink.classList.add('active');
    }

    // ==================== EVENT LISTENERS ====================
    document.getElementById('postJobForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        postJob({
            title: document.getElementById('jobTitle').value,
            description: document.getElementById('jobDesc').value,
            budget: document.getElementById('jobBudget').value,
            category: document.getElementById('jobCategory').value
        });
        closeModal('postJobModal');
        e.target.reset();
    });

    document.getElementById('hireForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const jobId = document.getElementById('hireJobSelect').value;
        const amount = document.getElementById('hireAmount').value;
        const message = document.getElementById('hireMessage').value;
        if (!jobId) { showToast('Select a job', 'error'); return; }
        if (hireFreelancer(jobId, amount, message)) {
            closeModal('hireModal');
            renderCurrentPage();
        }
    });

    document.querySelector('.sidebar')?.addEventListener('click', (e) => {
        const li = e.target.closest('li');
        if (!li) return;
        const page = li.dataset.page;
        if (page) {
            currentPage = page;
            renderCurrentPage();
        }
    });

    document.getElementById('myProfileLink')?.addEventListener('click', (e) => {
        e.preventDefault();
        currentPage = 'profile';
        renderCurrentPage();
    });

    document.getElementById('darkModeToggle')?.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const icon = document.querySelector('#darkModeToggle i');
        if (icon) icon.classList.toggle('fa-moon');
        if (icon) icon.classList.toggle('fa-sun');
    });

    document.getElementById('notificationBell')?.addEventListener('click', (e) => {
        e.stopPropagation();
        const dropdown = document.getElementById('notificationsDropdown');
        dropdown.classList.toggle('show');
        dropdown.innerHTML = notifications.map(n => `<div class="notification-item ${!n.read ? 'unread' : ''}"><div><strong>${n.message}</strong></div><div style="font-size: 11px;">${n.time}</div></div>`).join('');
        document.getElementById('notificationDot')?.style.setProperty('opacity', notifications.filter(n => !n.read).length ? '1' : '0.3');
    });

    document.addEventListener('click', () => {
        document.getElementById('notificationsDropdown')?.classList.remove('show');
    });

    // Make functions global
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.deleteJob = deleteJob;
    window.viewProposals = viewProposals;
    window.openHireModal = openHireModal;
    window.completeJob = completeJob;
